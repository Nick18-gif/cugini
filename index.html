<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ERROR 404</title>
    <style>
        /* Schermata di finto errore nera di base */
        #error-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-color: #121212; color: #ffffff; font-family: sans-serif;
            z-index: 9999; display: flex; flex-direction: column;
            align-items: center; justify-content: center; text-align: center;
        }
        .error-title { font-size: 45px; font-weight: bold; margin-bottom: 20px; color: #aaa; }
        .error-text { font-size: 18px; margin-bottom: 10px; color: #888; }

        /* SITO REALE: MODALITÀ CHIARA */
        body {
            background-color: #ffffff; color: #1a1a1a;
            font-family: 'Segoe UI', Roboto, sans-serif; margin: 0; padding: 20px;
        }
        .site-content { max-width: 800px; margin: 40px auto; text-align: center; }
        
        .btn {
            display: inline-block; background-color: #0078d4; color: white;
            padding: 12px 24px; border-radius: 5px; text-decoration: none; margin-top: 20px;
            font-weight: bold;
        }

        /* SITO REALE: MODALITÀ SCURA */
        @media (prefers-color-scheme: dark) {
            body { background-color: #121212; color: #ffffff; }
            .btn { background-color: #0086f0; }
        }
    </style>
</head>
<body>

    <div id="error-screen" onclick="chiediPassword()">
        <div class="error-title">ERROR 404</div>
        <div class="error-text">sito non raggiungibile.</div>
        <div class="error-text">prova a controllare la connessione.</div>
        <div style="font-size: 13px; color: #444; margin-top: 20px;">ERR_CONNECTION_REFUSED</div>
    </div>

    <div id="main-site" style="display: none;">
        <div class="site-content">
            <img src="copilot_image_1782214580327.jpeg" alt="Logo" style="width: 120px; height: 120px; border-radius: 50%; object-fit: cover; margin: 0 auto 20px; display: block;">
            <h1>Nick18 e Franci21</h1>
            <p>I migliori cugini d'Italia!</p>
            <a href="https://www.google.com/maps/dir/Sturno,+AV/San+Giovanni+in+Persiceto,+BO/" target="_blank" class="btn">Sturno e Bologna</a>
        </div>
    </div>

    <script>
        // Quando tocchi lo schermo, ti chiede la "bubba di salamini"!
        function chiediPassword() {
            const password = prompt("inserisci la bubba di salamini:");
            
            if (password === "pauramai2023!") {
                document.getElementById('error-screen').style.display = 'none';
                document.getElementById('main-site').style.display = 'block';
                document.title = "Nick18 e Franci21";
            } else if (password !== null) {
                alert("Password errata! Vai a quel paese");
            }
        }
    </script>
</body>
</html>
